name: Build Debug APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      # React Native 0.72 + sdkmanager both need JDK 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install JS dependencies
        run: npm install --legacy-peer-deps

      # Install Gradle 8.0.1 and regenerate the wrapper JAR (not committed to repo)
      - name: Generate Gradle wrapper JAR
        run: |
          curl -fL "https://services.gradle.org/distributions/gradle-8.0.1-bin.zip" \
            -o /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/gradle_dist
          /tmp/gradle_dist/gradle-8.0.1/bin/gradle wrapper \
            --gradle-version 8.0.1 \
            --project-dir android
          echo "Wrapper JAR: $(ls -lh android/gradle/wrapper/gradle-wrapper.jar)"

      # Write the correct SDK path — single source of truth for Gradle
      - name: Write android/local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties

      # Install only components that ubuntu-latest doesn't ship with
      - name: Install Android SDK components
        run: |
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-34" \
            "build-tools;33.0.0" \
            "ndk;23.1.7779620" 2>&1 | grep -v "^\[=" | tail -5

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        run: cd android && ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: BitAim-v3.1-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Show APK size
        run: ls -lh android/app/build/outputs/apk/debug/app-debug.apk
